[[repos]]
repo = "builtin"
hooks = [
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json" },
  { id = "check-json5" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
  { id = "check-added-large-files" },
  { id = "mixed-line-ending" },
  { id = "check-symlinks" },
  { id = "destroyed-symlinks" },
  { id = "check-merge-conflict" },
  { id = "detect-private-key" },
  { id = "no-commit-to-branch" },
  { id = "check-executables-have-shebangs" },
  { id = "check-shebang-scripts-are-executable" },
]

[[repos]]
repo = "local"
hooks = [
    {id = "cargo-fmt", name = "cargo fmt", entry = "cargo fmt --", language = "system", types = ["rust"], pass_filenames = false},
    {id = "cargo-clippy", name = "cargo clippy", entry = "cargo clippy --all-targets --all-features -- -D warnings", language = "system", types = ["rust"], pass_filenames = false},
]
