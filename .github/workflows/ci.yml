name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: j178/prek-action@v2
        with:
          install-only: true

      - name: Static checks (prek)
        run: prek run --all-files --skip no-commit-to-branch --show-diff-on-failure

      - name: Test
        run: cargo test --workspace

      - name: Build
        run: cargo build --workspace
